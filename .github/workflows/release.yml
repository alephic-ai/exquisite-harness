name: Release

# Compile and publish the self-contained `eh` binary whenever package.json's
# version is bumped on main. The gate is "the eh-v<version> release doesn't
# exist yet", so a merge to main that didn't change the version is a no-op and
# re-runs are idempotent. Lint/tests aren't re-gated here — changes reach main
# through PRs that already ran CI.
#
# Exception to "no-op": if the release already exists but the push changed
# files that get baked into the binary, that's a missed version bump — the
# changes shipped nothing — so the "Fail loudly on a missed release" step
# turns the silent no-op into a red run. version-guard.yml is meant to block
# that at PR time, but it's only as good as its enforcement; this turns a
# slip-through into a loud red release run instead of a silent green no-op.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'tsconfig.base.json'
  workflow_dispatch:

# Serialize runs so two near-simultaneous pushes (or a dispatch overlapping a
# push) can't both pass the release-existence check and race on
# `gh release create`. The queued run re-checks the release and no-ops via the
# existing idempotency gate.
concurrency:
  group: release-eh
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read package version
        id: ver
        run:
          echo "version=$(node -p "require('./package.json').version")" >>
          "$GITHUB_OUTPUT"

      - name: Check release
        id: rel
        run: |
          if gh release view "eh-v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Backstop for a missed version bump. The release is gated on the
      # eh-v<version> release not existing, so a push that didn't bump the
      # version no-ops by design — correct for re-runs, manual dispatch, and
      # pushes whose changes never enter the binary. But if THIS push changed
      # files that build.ts bakes into the binary and the version wasn't
      # bumped, those changes ship NOTHING and the miss stays invisible until
      # someone hits the stale binary.
      - name: Fail loudly on a missed release
        if: steps.rel.outputs.exists == 'true'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          version="${{ steps.ver.outputs.version }}"
          # A re-run replays the original push context (event_name=push,
          # before/sha unchanged) and only re-evaluates the release — which
          # may now exist solely because attempt 1 of THIS push created it.
          # Re-running a successful release would then look like a missed
          # bump. All the missed-bump signal is available on attempt 1, so
          # skip re-runs.
          if [ "${{ github.run_attempt }}" != '1' ]; then
            echo "Re-run (attempt ${{ github.run_attempt }}); missed-release check runs only on attempt 1."
            exit 0
          fi
          if [ "${{ github.event_name }}" != 'push' ]; then
            echo "Not a push event (manual dispatch); nothing to compare."
            exit 0
          fi
          # All-zero before-SHA means a new branch / initial push: nothing to diff.
          if [ -z "$BEFORE_SHA" ] || [ -z "${BEFORE_SHA//0/}" ]; then
            echo "No prior SHA (new branch / initial push); nothing to compare."
            exit 0
          fi
          # Use the compare API so we don't depend on the checkout holding
          # both SHAs. Same release-affecting filter as version-guard.yml:
          # everything baked into the binary.
          files=$(gh api "repos/$GITHUB_REPOSITORY/compare/$BEFORE_SHA...$AFTER_SHA" \
            --jq '.files[].filename') || {
            echo "compare API failed; skipping missed-release guard to avoid a false alarm."
            exit 0
          }
          changed=$(printf '%s\n' "$files" \
            | grep -E '^(src/|build\.ts$|package\.json$|pnpm-lock\.yaml$|tsconfig\.json$|tsconfig\.base\.json$)' || true)
          if [ -n "$changed" ]; then
            printf '%s\n' "$changed" | sed 's/^/  - /'
            echo "::error::eh-v$version is already released, but this push changed release-affecting files without a new version — they shipped nothing. Bump \"version\" in package.json to a new, unreleased version to ship them."
            exit 1
          fi
          echo "eh-v$version already released; no release-affecting changes in this push — idempotent no-op."

      - name: Install pnpm
        if: steps.rel.outputs.exists == 'false'
        uses: pnpm/action-setup@v4

      - name: Install Bun
        if: steps.rel.outputs.exists == 'false'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # `Bun.build` bundles the CLI's npm deps into the binary, so
      # node_modules must be present at compile time.
      - name: Install dependencies
        if: steps.rel.outputs.exists == 'false'
        run: pnpm install --frozen-lockfile

      - name: Compile binaries
        if: steps.rel.outputs.exists == 'false'
        run: pnpm compile

      - name: Smoke-test the linux-x64 binary
        if: steps.rel.outputs.exists == 'false'
        run: |
          got="$(./release/eh-linux-x64 --version)"
          echo "eh-linux-x64 --version: $got"
          [ "$got" = "${{ steps.ver.outputs.version }}" ]

      - name: Create release
        if: steps.rel.outputs.exists == 'false'
        run: |
          version="${{ steps.ver.outputs.version }}"
          binaries=(release/eh-*)
          if [ ! -e "${binaries[0]}" ]; then
            echo "No binaries found in release/" >&2
            exit 1
          fi
          notes=$(cat <<EOF
          Self-contained \`eh\` v$version binary.

          ## Install (macOS / Linux)

          1. Download the asset below matching your platform.
          2. Make it executable: \`chmod +x <file>\`
          3. macOS only — clear quarantine: \`xattr -d com.apple.quarantine <file>\`
          4. Move it onto your PATH, e.g. \`mv <file> ~/.local/bin/eh\`, then run \`eh doctor\`.
          EOF
          )
          gh release create "eh-v$version" \
            --target "$GITHUB_SHA" \
            --title "eh v$version" \
            --notes "$notes" \
            "${binaries[@]}"
